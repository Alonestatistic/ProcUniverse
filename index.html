<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ProcUniverse — Evolution Life Lab</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#05080b}iframe{display:block;width:100%;height:100%;border:0}.boot{position:fixed;inset:0;display:grid;place-items:center;background:#05080b;color:#cdd9e0;font:13px monospace;z-index:5}.boot.error{color:#ff8a8a;padding:32px;text-align:center;line-height:1.6}
</style>
</head>
<body>
<div class="boot" id="boot">Loading ProcUniverse Evolution Life Lab…</div>
<iframe id="sim" src="Procedural Biosphere Simulator.html" title="ProcUniverse simulator"></iframe>
<script>
(function(){
  const frame=document.getElementById('sim'),boot=document.getElementById('boot');
  function addStyle(doc,href){const link=doc.createElement('link');link.rel='stylesheet';link.href=href;doc.head.appendChild(link)}
  function addScript(doc,src){return new Promise((resolve,reject)=>{const s=doc.createElement('script');s.src=src;s.onload=resolve;s.onerror=reject;doc.body.appendChild(s)})}
  frame.addEventListener('load',async()=>{
    try{
      const doc=frame.contentDocument;
      if(!doc)throw new Error('The simulator frame could not be accessed.');
      addStyle(doc,'ui/life-lab.css');
      await addScript(doc,'ui/creature.js');
      await addScript(doc,'ui/life-lab.js');
      boot.remove();
    }catch(err){
      boot.className='boot error';
      boot.textContent='Enhanced launcher could not inject the Life Lab. Run this repository through a small local web server instead of a restricted file:// viewer. Original simulator: Procedural Biosphere Simulator.html';
      console.error(err);
    }
  });
})();
</script>
</body>
</html>
